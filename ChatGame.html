<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe AI</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        text-align: center;
        margin: 0;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5rem;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 30px;
    }

    .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2vmin;
    width: 80vmin;
    height: 80vmin;
    margin: 20px auto;
}

.cell {
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    font-size: 8vmin;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
}

    .cell:hover {
        background: rgba(255,255,255,0.2);
        transform: scale(1.05);
    }

    #status {
        font-size: 1.3rem;
        margin-top: 10px;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: white;
        color: #333;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
        background: #eee;
    }
</style>
</head>
<body>

<h1>Tic Tac Toe 🤖</h1>

<div class="container">
    <div class="board" id="board"></div>
    <div id="status">Your turn (X)</div>
    <button onclick="resetGame()">Restart</button>
</div>

<script>
    const boardEl = document.getElementById('board');
    const statusText = document.getElementById('status');

    let board = ["", "", "", "", "", "", "", "", ""];
    let human = "X";
    let ai = "O";
    let gameActive = true;

    const winCombos = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];

    // Create board
    function createBoard() {
        boardEl.innerHTML = "";
        board.forEach((cell, index) => {
            const div = document.createElement("div");
            div.classList.add("cell");
            div.dataset.index = index;
            div.textContent = cell;
            div.addEventListener("click", humanMove);
            boardEl.appendChild(div);
        });
    }

    function humanMove(e) {
        const index = e.target.dataset.index;

        if (board[index] !== "" || !gameActive) return;

        board[index] = human;
        createBoard();

        if (checkWinner(board, human)) {
            statusText.textContent = "You win 😳 (rare)";
            gameActive = false;
            return;
        }

        if (isDraw()) {
            statusText.textContent = "Draw!";
            return;
        }

        statusText.textContent = "Computer thinking...";
        setTimeout(aiMove, 400);
    }

    function aiMove() {
        let bestMove = minimax(board, ai).index;
        board[bestMove] = ai;
        createBoard();

        if (checkWinner(board, ai)) {
            statusText.textContent = "Computer wins 🤖";
            gameActive = false;
            return;
        }

        if (isDraw()) {
            statusText.textContent = "Draw!";
            return;
        }

        statusText.textContent = "Your turn (X)";
    }

    function minimax(newBoard, player) {
        let availSpots = newBoard
            .map((v, i) => v === "" ? i : null)
            .filter(v => v !== null);

        if (checkWinner(newBoard, human)) return {score: -10};
        if (checkWinner(newBoard, ai)) return {score: 10};
        if (availSpots.length === 0) return {score: 0};

        let moves = [];

        for (let i = 0; i < availSpots.length; i++) {
            let move = {};
            move.index = availSpots[i];
            newBoard[availSpots[i]] = player;

            if (player === ai) {
                let result = minimax(newBoard, human);
                move.score = result.score;
            } else {
                let result = minimax(newBoard, ai);
                move.score = result.score;
            }

            newBoard[availSpots[i]] = "";
            moves.push(move);
        }

        let bestMove;
        if (player === ai) {
            let bestScore = -Infinity;
            for (let i = 0; i < moves.length; i++) {
                if (moves[i].score > bestScore) {
                    bestScore = moves[i].score;
                    bestMove = i;
                }
            }
        } else {
            let bestScore = Infinity;
            for (let i = 0; i < moves.length; i++) {
                if (moves[i].score < bestScore) {
                    bestScore = moves[i].score;
                    bestMove = i;
                }
            }
        }

        return moves[bestMove];
    }

    function checkWinner(b, player) {
        return winCombos.some(combo =>
            combo.every(i => b[i] === player)
        );
    }

    function isDraw() {
        return board.every(cell => cell !== "");
    }

    function resetGame() {
        board = ["", "", "", "", "", "", "", "", ""];
        gameActive = true;
        statusText.textContent = "Your turn (X)";
        createBoard();
    }

    createBoard();
</script>

</body>
</html>
